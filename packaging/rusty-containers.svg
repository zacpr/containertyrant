<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0fbc9d"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="url(#accent)" stroke-width="4"/>
  
  <!-- Container stack -->
  <g fill="url(#accent)" opacity="0.9">
    <!-- Top container -->
    <rect x="32" y="24" width="64" height="24" rx="4"/>
    <!-- Middle container -->
    <rect x="32" y="52" width="64" height="24" rx="4"/>
    <!-- Bottom container -->
    <rect x="32" y="80" width="64" height="24" rx="4"/>
  </g>
  
  <!-- Container details (dots representing ports/status) -->
  <g fill="#1a1a2e">
    <circle cx="42" cy="36" r="3"/>
    <circle cx="52" cy="36" r="3"/>
    <circle cx="42" cy="64" r="3"/>
    <circle cx="52" cy="64" r="3"/>
    <circle cx="42" cy="92" r="3"/>
    <circle cx="52" cy="92" r="3"/>
  </g>
  
  <!-- Rust gear accent -->
  <g fill="#ff6b35" opacity="0.8">
    <circle cx="104" cy="104" r="16"/>
    <circle cx="104" cy="104" r="8" fill="#1a1a2e"/>
    <rect x="102" y="86" width="4" height="6" rx="1"/>
    <rect x="102" y="116" width="4" height="6" rx="1"/>
    <rect x="86" y="102" width="6" height="4" rx="1"/>
    <rect x="116" y="102" width="6" height="4" rx="1"/>
  </g>
</svg>
